site_name: GoLike Facebook Groups System
site_description: SOP xây dựng hệ sinh thái Facebook Group cho GoLike

theme:
  name: material
  language: vi
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Chế độ tối
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Chế độ sáng
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest

nav:
  - Trang chủ: index.md
  - SOP Tổng quan: ideal.md
  - Hướng dẫn:
      - Tạo Group: docs/01-tao-group.md
  - Danh sách Groups:
      - Kiếm tiền online 2026: docs/groups/01-kiem-tien-online-2026.md
      - Việc làm online sinh viên: docs/groups/02-viec-lam-online-sinh-vien.md
      - Tool tăng follow TikTok: docs/groups/03-tool-tang-follow-tiktok.md
      - Cách lên xu hướng TikTok: docs/groups/04-cach-len-xu-huong-tiktok.md
      - Cộng đồng GoLike Việt Nam: docs/groups/05-cong-dong-golike-viet-nam.md
      - Buff follow TikTok giá rẻ: docs/groups/06-buff-follow-tiktok-gia-re.md
      - Tăng like Facebook thật: docs/groups/07-tang-like-facebook-that.md
      - Tăng sub YouTube nhanh: docs/groups/08-tang-sub-youtube-nhanh.md
      - Hội review app kiếm tiền: docs/groups/09-hoi-review-app-kiem-tien.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
